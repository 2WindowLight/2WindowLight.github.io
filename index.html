<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin Board</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .post {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .post h2 {
            color: #333;
        }

        .post p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bulletin Board</h1>

        <div class="post">
            <h2>Post Title 1</h2>
            <p>This is the content of the first post.</p>
        </div>

        <div class="post">
            <h2>Post Title 2</h2>
            <p>This is the content of the second post.</p>
        </div>

        <div class="post">
            <h2>Post Title 3</h2>
            <p>This is the content of the third post.</p>
        </div>
    </div>
</body>
