<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Sharing Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Code Share</div>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/upload">Upload</a></li>
                <li><a href="/login">Login</a></li>
                <li><a href="/signup">Sign Up</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="upload-section">
            <h1>Upload Your Code</h1>
            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="file-input">
                    <label for="codeFile">Choose a file:</label>
                    <input type="file" id="codeFile" name="codeFile" accept=".zip, .tar.gz, .tar, .rar">
                </div>
                <div class="description">
                    <label for="description">Description (optional):</label>
                    <textarea id="description" name="description" rows="4" cols="50"></textarea>
                </div>
                <button type="submit">Upload</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2023 Code Share. All rights reserved.</p>
    </footer>
</body>
</html>
